<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Phân loại môn thể thao</title>
    <link rel="icon" href="../static/images/Icon.png" type="image/png">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
        }

        .wrapper {
            display: flex;
            max-width: 1200px;
            margin: 20px auto;
            height: 95vh;
        }

        .column {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 10px;
        }

        .left, .right {
            width: 20%;
        }

        .center {
            width: 60%;
            background-color: #fff;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            max-width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 22px;
            text-align: center;
            background-color: #2c3e50;
            color: white;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 0px;
        }

        .image-box {
            width: 100%;
            height: 25%;
            border: 2px dashed #ccc;
            background-color: #f9f9f9;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-weight: bold;
            color: #888;
        }

        form {
            width: 100%;
        }
        .image-box img {
            max-width: 100%;
            max-height: 100%;
            object-fit: cover;
        }
        textarea {
            width: 100%;
            height: 250px;
            padding: 12px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #ccc;
            resize: vertical;
        }

        .error {
            font-weight: bold;
            color: red;
            margin-top: 8px;
            text-align: center;
        }
        .result {
            background-color: #2c3e50;
            color: white;
            padding: 8px 16px;
            border-radius: 5px;
            text-align: center;
            margin-top: 12px;
        }
        .button-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            width: 100%;
            position: relative;
        }       
        input[type="submit"],
        .btn-clear {
            padding: 10px 18px;
            font-size: 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        input[type="submit"] {
            background-color: #4CAF50;
            color: white;
            padding: 10px 18px;
            font-size: 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        input[type="submit"]:hover {
            background-color: #45a049;
        }

        .btn-clear {
            background-color: #e74c3c;
            color: white;
            padding: 10px 18px;
            font-size: 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-left: auto;
        }

        .btn-clear:hover {
            background-color: #c0392b;
        }

    </style>
    <script>
        function validateForm() {
            const content = document.forms["predictionForm"]["content"].value.trim();
            const errorDiv = document.getElementById("error");
    
            if (!content) {
                errorDiv.innerText = "Vui lòng nhập nội dung!";
                return false;
            } else if (content.length < 50) {
                errorDiv.innerText = "Nội dung quá ngắn. Cần ít nhất 50 ký tự để mô hình có thể phân loại.";
                return false;
            }
    
            errorDiv.innerText = "";
            return true;
        }
    
        function clearTextarea() {
            document.getElementById("contentInput").value = "";
        }
    </script>
    
</head>
<body>
    <div class="wrapper">
        <!-- Cột trái -->
        <div class="column left">
            <div class="image-box">
                <img src="../static/images/Anh1.jpg" alt="Ảnh 1">
            </div>
            <div class="image-box">
                <img src="../static/images/Anh2.jpg" alt="Ảnh 2">
            </div>
            <div class="image-box">
                <img src="../static/images/Anh3.jpg" alt="Ảnh 3">
            </div>
            <div class="image-box">
                <img src="../static/images/Anh4.webp" alt="Ảnh 4">
            </div>
        </div>

        <!-- Cột giữa -->
    <div class="column center">
        <h1>Phân Loại Tin Tức Trong Lĩnh Vực Thể Thao</h1>
        <form name="predictionForm" method="post" onsubmit="return validateForm();">
            <textarea id="contentInput" name="content" placeholder="Nhập nội dung bài viết...">{{ request.form.get('content', '') }}</textarea>
            <div id="error" class="error"></div>
        
            <div class="button-group">
                <input type="submit" value="Phân loại">
                <button type="button" class="btn-clear" onclick="clearTextarea()">Xóa</button>
            </div>
        </form>

    {% if result and result.strip() %}
        <div class="result">{{ result }}</div>
    {% endif %}
</div>

        <!-- Cột phải -->
        <div class="column right">
            <div class="image-box">
                <img src="../static/images/Anh5.jpg" alt="Ảnh 5">
            </div>
            <div class="image-box">
                <img src="../static/images/Anh6.webp" alt="Ảnh 6">
            </div>
            <div class="image-box">
                <img src="../static/images/Anh7.webp" alt="Ảnh 7">
            </div>
            <div class="image-box">
                <img src="../static/images/Anh8.jpg" alt="Ảnh 8">
            </div>
        </div>
    </div>
</body>
</html>
